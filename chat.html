<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200">
  <div class="h-screen flex flex-col">
    <div class="bg-green-600 text-white p-4 flex items-center">
      <button onclick="history.back()" class="mr-3">←</button>
      <div>
        <div id="chat-name" class="font-bold">Loading...</div>
        <div id="chat-status" class="text-xs">online</div>
      </div>
    </div>
    
    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
    
    <div class="bg-white p-2 flex">
      <input id="msg-input" type="text" placeholder="Type a message" class="flex-1 border rounded-full px-4 py-2">
      <button id="send-btn" class="ml-2 bg-green-500 text-white rounded-full w-10 h-10">→</button>
    </div>
  </div>
  <script type="module">
    import { loadChat } from './app.js'
    const urlParams = new URLSearchParams(window.location.search)
    const chatId = urlParams.get('id')
    loadChat(chatId)
  </script>
</body>
      </html>
