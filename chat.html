<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevChat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
height:100vh;
background:#0f0f0f;
color:white;
}

.contacts{
width:300px;
background:#1a1a1a;
padding:20px;
}

.contact{
padding:15px;
background:#2a2a2a;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#C8102E;
padding:15px;
font-weight:bold;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
background:#333;
padding:10px;
border-radius:10px;
margin-bottom:10px;
width:max-content;
}

.input-area{
display:flex;
padding:15px;
background:#1a1a1a;
}

.input-area input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
}

.input-area button{
margin-left:10px;
padding:12px 20px;
background:#FFD700;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="contacts">

<h2>Chats</h2>

<div class="contact">John</div>
<div class="contact">Sarah</div>
<div class="contact">Mike</div>

</div>

<div class="chat">

<div class="header">
John
</div>

<div class="messages" id="messages">
<div class="message">Hello 👋</div>
</div>

<div class="input-area">

<input type="text" id="messageInput" placeholder="Type a message...">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>
function sendMessage(){

let input=document.getElementById("messageInput");

if(input.value.trim()!=""){

let msg=document.createElement("div");

msg.className="message";

msg.innerText=input.value;

document.getElementById("messages").appendChild(msg);

input.value="";
}
}
</script>

</body>
  </html>
