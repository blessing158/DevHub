<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chata</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .wa-bg { background: #0b141a; }
    .wa-header { background: #202c33; }
    .wa-green { background: #00a884; }
    .wa-tab-active { color: #00a884; border-bottom: 3px solid #00a884; }
    .chat-row:active { background: #2a3942; }
    .msg-me { background: #005c4b; }
    .msg-you { background: #202c33; }
  </style>
</head>
<body class="wa-bg text-gray-100 h-screen flex flex-col">

  <!-- LOGIN -->
  <div id="login" class="h-full flex items-center justify-center">
    <div class="wa-header p-6 rounded-lg w-80">
      <h1 class="text-2xl font-bold text-[#00a884] mb-6">Chata</h1>
      <input id="phone" placeholder="Phone number" class="w-full bg-[#2a3942] p-3 rounded mb-3 outline-none">
      <input id="name" placeholder="Your name" class="w-full bg-[#2a3942] p-3 rounded mb-4 outline-none">
      <button onclick="doLogin()" class="w-full wa-green p-3 rounded font-bold">Start Chatting</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden h-full flex flex-col">
    <!-- HEADER -->
    <div class="wa-header px-4 pt-3">
      <div class="flex justify-between items-center pb-2">
        <h1 class="text-xl font-medium">Chata</h1>
        <div class="flex gap-5 text-xl">
          <button onclick="showCamera()">📷</button>
          <button onclick="showMenu()">⋮</button>
        </div>
      </div>
      <div class="flex text-gray-400">
        <button id="tab-chats" onclick="switchTab('chats')" class="flex-1 py-3 text-sm font-medium wa-tab-active">Chats</button>
        <button id="tab-updates" onclick="switchTab('updates')" class="flex-1 py-3 text-sm font-medium">Updates</button>
        <button id="tab-communities" onclick="switchTab('communities')" class="flex-1 py-3 text-sm font-medium">Communities</button>
        <button id="tab-calls" onclick="switchTab('calls')" class="flex-1 py-3 text-sm font-medium">Calls</button>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="wa-header px-3 pb-2">
      <div class="bg-[#2a3942] rounded-lg flex items-center px-3 py-1.5">
        <span class="mr-3">🔍</span>
        <input id="search" placeholder="Ask Meta AI or Search" class="bg-transparent outline-none flex-1 text-sm">
      </div>
    </div>

    <!-- CHATS LIST -->
    <div id="chats-tab" class="flex-1 overflow-y-auto"></div>

    <!-- UPDATES TAB -->
    <div id="updates-tab" class="hidden flex-1 overflow-y-auto p-4">
      <div class="text-sm font-medium mb-3">Channels</div>
      <div id="channels-list"></div>
    </div>

    <!-- COMMUNITIES TAB -->
    <div id="communities-tab" class="hidden flex-1 flex items-center justify-center text-center p-8 text-gray-400">
      <div>
        <div class="text-5xl mb-4">👥</div>
        <div class="font-medium mb-2">Stay connected with a community</div>
        <button class="wa-green px-4 py-2 rounded-full text-white mt-4">Start your community</button>
      </div>
    </div>

    <!-- CALLS TAB -->
    <div id="calls-tab" class="hidden flex-1 flex items-center justify-center text-center p-8 text-gray-400">
      <div>
        <div class="text-5xl mb-4">🔒</div>
        <div class="font-medium mb-2">Make private calls</div>
        <div class="text-sm">Stay connected with secure video and audio calls</div>
      </div>
    </div>

    <!-- FLOATING NEW CHAT BUTTON -->
    <button onclick="newChat()" class="wa-green w-14 h-14 rounded-2xl fixed bottom-6 right-4 text-2xl shadow-lg">💬</button>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen" class="hidden h-full flex flex-col wa-bg">
    <div class="wa-header p-3 flex items-center gap-3">
      <button onclick="closeChat()" class="text-xl">←</button>
      <div class="w-10 h-10 bg-gray-500 rounded-full"></div>
      <div class="flex-1">
        <div id="chat-title" class="font-medium"></div>
        <div class="text-xs text-gray-400">online</div>
      </div>
      <div class="flex gap-5 text-xl">
        <button>📹</button>
        <button>📞</button>
        <button>⋮</button>
      </div>
    </div>
    <div id="msgs" class="flex-1 overflow-y-auto p-3 space-y-1" style="background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')"></div>
    <div class="wa-header p-2 flex items-end gap-2">
      <button class="text-2xl px-1">😊</button>
      <div class="flex-1 bg-[#2a3942] rounded-2xl flex items-center px-3">
        <input id="msgtext" placeholder="Message" class="bg-transparent py-2 outline-none flex-1">
        <button class="text-xl">📎</button>
        <button class="text-xl ml-2">📷</button>
      </div>
      <button id="sendbtn" onclick="sendMsg()" class="wa-green w-12 h-12 rounded-full text-xl">🎤</button>
    </div>
  </div>

<script>
const SUPA_URL = 'YOUR_SUPABASE_URL'
const SUPA_KEY = 'YOUR_SUPABASE_ANON_KEY'
const supa = supabase.createClient(SUPA_URL, SUPA_KEY)
let user = null, currentChat = null

// Run this SQL in Supabase first:
// CREATE TABLE profiles (id uuid primary key, username text, phone text, avatar text);
// CREATE TABLE chats (id uuid primary key default gen_random_uuid(), name text, is_group bool default false, last_msg text, updated_at timestamp default now());
// CREATE TABLE chat_members (chat_id uuid, user_id uuid, primary key (chat_id, user_id));
// CREATE TABLE messages (id bigserial primary key, chat_id uuid, sender_id uuid, text text, created_at timestamp default now());
// ALTER PUBLICATION supabase_realtime ADD TABLE messages;

async function doLogin() {
  const phone = document.getElementById('phone').value
  const name = document.getElementById('name').value
  if (!phone || !name) return alert('Fill both fields')
  
  const { data, error } = await supa.auth.signUp({ 
    phone, password: phone, options: { data: { username: name } } 
  })
  if (error) return alert(error.message)
  
  user = data.user
  document.getElementById('login').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
  loadChats()
}

async function loadChats() {
  const { data: chats } = await supa.from('chats').select('*').order('updated_at', { ascending: false })
  document.getElementById('chats-tab').innerHTML = chats?.map(c => `
    <div onclick="openChat('${c.id}','${c.name}')" class="chat-row flex items-center gap-3 p-3 border-b border-[#222d34]">
      <div class="w-12 h-12 bg-gray-600 rounded-full"></div>
      <div class="flex-1 border-b border-[#222d34] pb-3">
        <div class="flex justify-between">
          <div class="font-medium">${c.name || 'Chat'}</div>
          <div class="text-xs text-gray-400">15:28</div>
        </div>
        <div class="text-sm text-gray-400 truncate">${c.last_msg || 'Tap to start chatting'}</div>
      </div>
    </div>
  `).join('') || '<div class="p-8 text-center text-gray-400">No chats yet. Tap + to start</div>'
  
  // Mock channels for Updates tab
  document.getElementById('channels-list').innerHTML = `
    <div class="flex items-center gap-3 p-3">
      <div class="w-12 h-12 bg-green-600 rounded-full flex items-center justify-center">✓</div>
      <div><div class="font-medium">FIFA World Cup</div><div class="text-xs text-gray-400">10.1M followers</div></div>
    </div>
  `
}

function switchTab(tab) {
  ['chats','updates','communities','calls'].forEach(t => {
    document.getElementById(t+'-tab').classList.add('hidden')
    document.getElementById('tab-'+t).classList.remove('wa-tab-active')
  })
  document.getElementById(tab+'-tab').classList.remove('hidden')
  document.getElementById('tab-'+tab).classList.add('wa-tab-active')
}

async function openChat(id, name) {
  currentChat = id
  document.getElementById('app').classList.add('hidden')
  document.getElementById('chat-screen').classList.remove('hidden')
  document.getElementById('chat-title').textContent = name
  
  const { data } = await supa.from('messages').select('*').eq('chat_id', id).order('created_at')
  document.getElementById('msgs').innerHTML = ''
  data?.forEach(addMsg)
  
  supa.channel('chat'+id).on('postgres_changes', 
    { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${id}` }, 
    p => addMsg(p.new)
  ).subscribe()
}

function addMsg(m) {
  const me = m.sender_id === user?.id
  const time = new Date(m.created_at).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'})
  document.getElementById('msgs').innerHTML += `
    <div class="flex ${me?'justify-end':'justify-start'}">
      <div class="${me?'msg-me':'msg-you'} rounded-lg px-2 py-1.5 max-w-[75%] text-sm">
        ${m.text}
        <span class="text-[10px] text-gray-300 ml-2">${time}</span>
      </div>
    </div>`
  document.getElementById('msgs').scrollTop = 9e9
}

async function sendMsg() {
  const text = document.getElementById('msgtext').value.trim()
  if (!text || !currentChat) return
  await supa.from('messages').insert({ chat_id: currentChat, sender_id: user.id, text })
  await supa.from('chats').update({ last_msg: text, updated_at: new Date() }).eq('id', currentChat)
  document.getElementById('msgtext').value = ''
  document.getElementById('sendbtn').innerHTML = '🎤'
}

async function newChat() {
  const phone = prompt('Enter phone number:')
  if (!phone) return
  const { data: u } = await supa.from('profiles').select('*').eq('phone', phone).single()
  if (!u) return alert('User not on Chata yet')
  
  const { data: chat } = await supa.from('chats').insert({ name: u.username }).select().single()
  await supa.from('chat_members').insert([{ chat_id: chat.id, user_id: user.id }, { chat_id: chat.id, user_id: u.id }])
  openChat(chat.id, u.username)
}

function closeChat() {
  document.getElementById('chat-screen').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
  loadChats()
}

document.getElementById('msgtext').addEventListener('input', e => {
  document.getElementById('sendbtn').innerHTML = e.target.value ? '➤' : '🎤'
})

// Auto-login if session exists
supa.auth.getSession().then(({ data: { session } }) => {
  if (session) { user = session.user; document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); loadChats() }
})
</script>
</body>
  </html>
