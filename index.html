<!DOCTYPE html>
<html>
<head>
  <title>AnimStudio 3D - Web Blender Lite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    * { margin: 0; box-sizing: border-box; font-family: Arial; }
    body { background: #1e1e1e; color: #ddd; overflow: hidden; }
  .app { display: flex; height: 100vh; flex-direction: column; }
  .header { background: #2d2d2d; padding: 8px 12px; display: flex; gap: 8px; border-bottom: 1px solid #444; }
  .btn { background: #555; color: white; border: 1px solid #666; padding: 6px 10px; border-radius: 4px; font-size: 13px; }
  .btn:hover { background: #666; }
  .btn-active { background: #007acc; border-color: #007acc; }
  .main { display: flex; flex: 1; }
  .viewport { flex: 1; position: relative; }
    #c { width: 100%; height: 100%; display: block; }
  .sidebar { width: 250px; background: #252526; border-left: 1px solid #444; padding: 10px; overflow-y: auto; }
  .timeline { height: 200px; background: #252526; border-top: 1px solid #444; padding: 8px; }
  .timeline-track { height: 30px; background: #1e1e1e; margin: 4px 0; position: relative; border-radius: 3px; }
  .keyframe { width: 8px; height: 20px; background: #ffcc00; position: absolute; top: 5px; cursor: pointer; }
  .playhead { width: 2px; height: 100%; background: #ff0000; position: absolute; top: 0; }
  .panel { margin-bottom: 15px; }
  .panel h3 { font-size: 14px; margin: 0 0 8px 0; color: #007acc; }
    input[type="number"] { width: 60px; background: #3c3c3c; border: 1px solid #555; color: #ddd; padding: 4px; }
    label { font-size: 12px; color: #aaa; display: inline-block; width: 20px; }
  .outliner-item { padding: 4px; cursor: pointer; border-radius: 3px; }
  .outliner-item:hover,.outliner-item.selected { background: #094771; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="btn" onclick="addPrimitive('cube')">Add Cube</button>
    <button class="btn" onclick="addPrimitive('sphere')">Add Sphere</button>
    <button class="btn" onclick="addPrimitive('light')">Add Light</button>
    <button class="btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button class="btn" onclick="addKeyframe()">+ Key</button>
    <button class="btn" onclick="exportGLB()">Export GLB</button>
    <span style="margin-left:auto;font-size:12px;color:#888">Frame: <span id="frameNum">0</span>/120</span>
  </div>

  <div class="main">
    <div class="viewport">
      <canvas id="c"></canvas>
    </div>
    <div class="sidebar">
      <div class="panel">
        <h3>Outliner</h3>
        <div id="outliner"></div>
      </div>
      <div class="panel" id="transformPanel">
        <h3>Transform</h3>
        <div><label>X</label><input type="number" id="posX" step="0.1" oninput="updateTransform()"></div>
        <div><label>Y</label><input type="number" id="posY" step="0.1" oninput="updateTransform()"></div>
        <div><label>Z</label><input type="number" id="posZ" step="0.1" oninput="updateTransform()"></div>
        <div style="margin-top:8px"><label>RX</label><input type="number" id="rotX" step="1" oninput="updateTransform()"></div>
        <div><label>RY</label><input type="number" id="rotY" step="1" oninput="updateTransform()"></div>
        <div><label>RZ</label><input type="number" id="rotZ" step="1" oninput="updateTransform()"></div>
      </div>
    </div>
  </div>

  <div class="timeline">
    <input type="range" id="scrubber" min="0" max="120" value="0" style="width:100%" oninput="setFrame(this.value)">
    <div class="timeline-track" id="track"></div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// SCENE SETUP
const canvas = document.getElementById('c');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a2a);

const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth/canvas.clientHeight, 0.1, 1000);
camera.position.set(5, 5, 5);

const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setSize(canvas.clientWidth, canvas.clientHeight);
renderer.shadowMap.enabled = true;

const controls = new OrbitControls(camera, canvas);
const transform = new TransformControls(camera, canvas);
scene.add(transform);

// GRID + LIGHT
scene.add(new THREE.GridHelper(10, 10, 0x444444, 0x222222));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7); scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// STATE
let objects = [];
let selected = null;
let currentFrame = 0;
let isPlaying = false;
let keyframes = {}; // { objId: { frame: {pos, rot} } }

transform.addEventListener('dragging-changed', e => { controls.enabled =!e.value; });
transform.addEventListener('objectChange', updateTransformInputs);

// ADD OBJECTS
window.addPrimitive = (type) => {
  let mesh;
  if(type === 'cube') mesh = new THREE.Mesh(new THREE.BoxGeometry(), new THREE.MeshStandardMaterial({color: 0x007acc}));
  if(type === 'sphere') mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshStandardMaterial({color: 0xcc0000}));
  if(type === 'light') mesh = new THREE.PointLight(0xffffff, 1, 10);

  mesh.position.set((Math.random()-0.5)*4, 0.5, (Math.random()-0.5)*4);
  mesh.userData.id = Date.now();
  mesh.userData.name = type + '_' + objects.length;

  scene.add(mesh);
  objects.push(mesh);
  selectObject(mesh);
  updateOutliner();
};

function selectObject(obj) {
  selected = obj;
  transform.attach(obj);
  updateTransformInputs();
  document.querySelectorAll('.outliner-item').forEach(el => el.classList.remove('selected'));
  document.getElementById('obj_' + obj.userData.id)?.classList.add('selected');
}

function updateOutliner() {
  document.getElementById('outliner').innerHTML = objects.map(o =>
    `<div class="outliner-item" id="obj_${o.userData.id}" onclick="selectObjById(${o.userData.id})">${o.userData.name}</div>`
  ).join('');
}

window.selectObjById = (id) => {
  const obj = objects.find(o => o.userData.id === id);
  if(obj) selectObject(obj);
};

// TRANSFORM
function updateTransformInputs() {
  if(!selected) return;
  posX.value = selected.position.x.toFixed(2);
  posY.value = selected.position.y.toFixed(2);
  posZ.value = selected.position.z.toFixed(2);
  rotX.value = (selected.rotation.x * 180/Math.PI).toFixed(0);
  rotY.value = (selected.rotation.y * 180/Math.PI).toFixed(0);
  rotZ.value = (selected.rotation.z * 180/Math.PI).toFixed(0);
}

window.updateTransform = () => {
  if(!selected) return;
  selected.position.set(parseFloat(posX.value), parseFloat(posY.value), parseFloat(posZ.value));
  selected.rotation.set(parseFloat(rotX.value)*Math.PI/180, parseFloat(rotY.value)*Math.PI/180, parseFloat(rotZ.value)*Math.PI/180);
};

// ANIMATION
window.addKeyframe = () => {
  if(!selected) return;
  const id = selected.userData.id;
  if(!keyframes[id]) keyframes[id] = {};
  keyframes[id][currentFrame] = {
    pos: selected.position.clone(),
    rot: selected.rotation.clone()
  };
  renderTimeline();
};

function renderTimeline() {
  const track = document.getElementById('track');
  track.innerHTML = '<div class="playhead" id="playhead"></div>';
  if(selected && keyframes[selected.userData.id]) {
    Object.keys(keyframes[selected.userData.id]).forEach(f => {
      const kf = document.createElement('div');
      kf.className = 'keyframe';
      kf.style.left = `${(f/120)*100}%`;
      track.appendChild(kf);
    });
  }
  document.getElementById('playhead').style.left = `${(currentFrame/120)*100}%`;
}

window.setFrame = (frame) => {
  currentFrame = parseInt(frame);
  document.getElementById('frameNum').textContent = currentFrame;

  // Interpolate objects
  objects.forEach(obj => {
    const keys = keyframes[obj.userData.id];
    if(!keys) return;
    const frames = Object.keys(keys).map(Number).sort((a,b)=>a-b);
    let prev = frames.filter(f=>f<=currentFrame).pop();
    let next = frames.find(f=>f>=currentFrame);

    if(prev!== undefined && next!== undefined) {
      const t = (currentFrame - prev) / (next - prev);
      obj.position.lerpVectors(keys[prev].pos, keys[next].pos, t);
      obj.quaternion.slerpQuaternions(
        new THREE.Quaternion().setFromEuler(keys[prev].rot),
        new THREE.Quaternion().setFromEuler(keys[next].rot),
        t
      );
    } else if(prev!== undefined) {
      obj.position.copy(keys[prev].pos);
      obj.rotation.copy(keys[prev].rot);
    }
  });

  renderTimeline();
  if(selected) updateTransformInputs();
};

window.togglePlay = () => {
  isPlaying =!isPlaying;
  document.getElementById('playBtn').textContent = isPlaying? '⏸ Pause' : '▶ Play';
};

// EXPORT
window.exportGLB = () => {
  const exporter = new GLTFExporter();
  exporter.parse(scene, (gltf) => {
    const blob = new Blob([gltf], {type: 'model/gltf-binary'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'scene.glb'; a.click();
  }, {binary: true});
};

// RENDER LOOP
function animate() {
  requestAnimationFrame(animate);
  if(isPlaying) {
    currentFrame = (currentFrame + 1) % 121;
    document.getElementById('scrubber').value = currentFrame;
    setFrame(currentFrame);
  }
  controls.update();
  renderer.render(scene, camera);
}

// RESIZE
window.addEventListener('resize', () => {
  camera.aspect = canvas.clientWidth / canvas.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);
});

// START
addPrimitive('cube');
animate();
</script>
</body>
  </html>
