<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AnimStudio PRO - Movie Production Suite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#6a1b9a">
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQW5pbVN0dWRpbyBQUk8iLCJzaG9ydF9uYW1lIjoiQW5pbVN0dWRpbyIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGYwZjBmIiwidGhlbWVfY29sb3IiOiIjNmExYjlhIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzM2NTkvMzY1OTg0Mi5wbmciLCJzaXplcyI6IjUxMng1MTIiLCJ0eXBlIjoiaW1hZ2UvcG5nIn1dfQ==">
  <style>
    :root { --bg: #0a0a0a; --panel: #161616; --accent: #9c27b0; --accent2: #6a1b9a; --text: #eee; --border: #2a2a2a; }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); overscroll-behavior: none; }
   .app { display: flex; flex-direction: column; height: 100vh; }
   .header { background: linear-gradient(135deg, var(--accent2), var(--accent)); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
   .header h1 { margin: 0; font-size: 18px; }
   .tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); overflow-x: auto; }
   .tab { padding: 14px 18px; border: none; background: none; color: #888; font-size: 14px; white-space: nowrap; }
   .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
   .content { flex: 1; overflow-y: auto; padding: 12px; }
   .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
   .btn { background: var(--accent); color: white; border: none; padding: 10px 14px; border-radius: 6px; font-size: 14px; }
   .btn-sec { background: #333; }
   .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    input, textarea, select { width: 100%; padding: 10px; margin: 6px 0; background: #222; color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-size: 15px; }
    label { font-size: 13px; color: #aaa; margin-top: 8px; display: block; }
   .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
   .timeline { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; }
   .shot { min-width: 100px; background: #222; border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 12px; }
   .shot.active { border-color: var(--accent); }
    img.preview { max-width: 100%; border-radius: 6px; margin-top: 8px; }
   .hidden { display: none; }
   .tag { display: inline-block; background: #333; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>AnimStudio PRO 🎬</h1>
    <button class="btn btn-sec" onclick="exportProject()">Export Pack</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('storyboard')">Storyboard</button>
    <button class="tab" onclick="showTab('characters')">Characters</button>
    <button class="tab" onclick="showTab('assets')">Assets</button>
    <button class="tab" onclick="showTab('budget')">Budget</button>
    <button class="tab" onclick="showTab('schedule')">Schedule</button>
  </div>

  <div class="content">
    <!-- STORYBOARD TAB -->
    <div id="storyboard" class="tab-content">
      <div class="toolbar">
        <button class="btn" onclick="addShot()">+ Shot</button>
        <button class="btn btn-sec" onclick="saveProject()">Save</button>
        <button class="btn btn-sec" onclick="loadProject()">Load</button>
      </div>
      <label>Timeline</label>
      <div class="timeline" id="timeline"></div>
      <div id="shots"></div>
    </div>

    <!-- CHARACTERS TAB -->
    <div id="characters" class="tab-content hidden">
      <div class="toolbar">
        <button class="btn" onclick="addCharacter()">+ Character</button>
      </div>
      <div id="charList"></div>
    </div>

    <!-- ASSETS TAB -->
    <div id="assets" class="tab-content hidden">
      <div class="toolbar">
        <button class="btn" onclick="document.getElementById('assetUpload').click()">+ Upload Asset</button>
        <input type="file" id="assetUpload" multiple accept="image/*,audio/*" class="hidden" onchange="handleAssets(event)">
      </div>
      <div id="assetGrid"></div>
    </div>

    <!-- BUDGET TAB -->
    <div id="budget" class="tab-content hidden">
      <div class="card">
        <h3>Budget Tracker</h3>
        <div class="grid-2">
          <div><label>Total Budget</label><input type="number" id="totalBudget" oninput="calcBudget()" value="10000"></div>
          <div><label>Spent</label><input type="number" id="spent" value="0" readonly></div>
        </div>
        <div id="budgetItems"></div>
        <button class="btn btn-sec" onclick="addBudgetItem()">+ Add Cost</button>
      </div>
    </div>

    <!-- SCHEDULE TAB -->
    <div id="schedule" class="tab-content hidden">
      <div class="card">
        <label>Production Start</label><input type="date" id="startDate" onchange="genSchedule()">
        <label>Days Per Shot</label><input type="number" id="daysPerShot" value="2" oninput="genSchedule()">
        <div id="scheduleList"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let project = { shots: [], characters: [], assets: [], budget: [] };
let currentShot = 0;

// TABS
function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.remove('hidden');
  event.target.classList.add('active');
}

// STORYBOARD
function addShot() {
  project.shots.push({id:Date.now(), num:project.shots.length+1, desc:'', duration:3, camera:'Wide', chars:[], board:''});
  currentShot = project.shots.length-1;
  renderShots();
}

function renderShots() {
  const tl = document.getElementById('timeline');
  const sh = document.getElementById('shots');
  tl.innerHTML = ''; sh.innerHTML = '';

  project.shots.forEach((s,i) => {
    tl.innerHTML += `<div class="shot ${i===currentShot?'active':''}" onclick="currentShot=${i};renderShots()">Shot ${s.num}<br>${s.duration}s</div>`;

    if(i === currentShot) {
      sh.innerHTML = `
      <div class="card">
        <h3>Shot ${s.num} <button class="btn btn-sec" style="float:right;background:#d32f2f" onclick="deleteShot(${i})">Delete</button></h3>
        <label>Action / Dialogue</label>
        <textarea rows="3" oninput="project.shots[${i}].desc=this.value">${s.desc}</textarea>
        <div class="grid-2">
          <div><label>Duration (sec)</label><input type="number" value="${s.duration}" oninput="project.shots[${i}].duration=this.value;renderShots()"></div>
          <div><label>Camera</label>
            <select oninput="project.shots[${i}].camera=this.value">
              <option ${s.camera=='Wide'?'selected':''}>Wide</option>
              <option ${s.camera=='Medium'?'selected':''}>Medium</option>
              <option ${s.camera=='Close-Up'?'selected':''}>Close-Up</option>
              <option ${s.camera=='POV'?'selected':''}>POV</option>
            </select>
          </div>
        <label>Storyboard Frame</label>
        <input type="file" accept="image/*" onchange="uploadBoard(event,${i})">
        ${s.board? `<img src="${s.board}" class="preview">` : ''}
      </div>`;
    }
  });
}

function deleteShot(i) { project.shots.splice(i,1); currentShot=0; renderShots(); }
function uploadBoard(e,i) {
  const r = new FileReader(); r.onload = () => { project.shots[i].board = r.result; renderShots(); };
  r.readAsDataURL(e.target.files[0]);
}

// CHARACTERS
function addCharacter() {
  project.characters.push({id:Date.now(), name:'', role:'Main', desc:'', ref:''});
  renderChars();
}

function renderChars() {
  const list = document.getElementById('charList');
  list.innerHTML = project.characters.map((c,i) => `
    <div class="card">
      <input placeholder="Character Name" value="${c.name}" oninput="project.characters[${i}].name=this.value">
      <select oninput="project.characters[${i}].role=this.value">
        <option ${c.role=='Main'?'selected':''}>Main</option>
        <option ${c.role=='Supporting'?'selected':''}>Supporting</option>
        <option ${c.role=='Extra'?'selected':''}>Extra</option>
      </select>
      <textarea placeholder="Description / Personality" oninput="project.characters[${i}].desc=this.value">${c.desc}</textarea>
      <label>Reference Image</label>
      <input type="file" accept="image/*" onchange="uploadCharRef(event,${i})">
      ${c.ref? `<img src="${c.ref}" class="preview">` : ''}
    </div>
  `).join('');
}

function uploadCharRef(e,i) {
  const r = new FileReader(); r.onload = () => { project.characters[i].ref = r.result; renderChars(); };
  r.readAsDataURL(e.target.files[0]);
}

// ASSETS
function handleAssets(e) {
  [...e.target.files].forEach(f => {
    const r = new FileReader();
    r.onload = () => { project.assets.push({name:f.name, type:f.type, data:r.result}); renderAssets(); };
    r.readAsDataURL(f);
  });
}

function renderAssets() {
  document.getElementById('assetGrid').innerHTML = project.assets.map(a => `
    <div class="card">
      <b>${a.name}</b><br>
      ${a.type.startsWith('image')? `<img src="${a.data}" class="preview">` : `<span class="tag">${a.type}</span>`}
    </div>
  `).join('');
}

// BUDGET
function addBudgetItem() {
  project.budget.push({item:'', cost:0});
  renderBudget();
}

function renderBudget() {
  document.getElementById('budgetItems').innerHTML = project.budget.map((b,i) => `
    <div class="grid-2" style="margin-top:8px">
      <input placeholder="Item" value="${b.item}" oninput="project.budget[${i}].item=this.value;calcBudget()">
      <input type="number" placeholder="Cost" value="${b.cost}" oninput="project.budget[${i}].cost=parseFloat(this.value)||0;calcBudget()">
    </div>
  `).join('');
  calcBudget();
}

function calcBudget() {
  const total = project.budget.reduce((sum,b) => sum + b.cost, 0);
  document.getElementById('spent').value = total;
}

// SCHEDULE
function genSchedule() {
  const start = new Date(document.getElementById('startDate').value);
  const days = parseInt(document.getElementById('daysPerShot').value) || 2;
  if(!start.getTime()) return;

  let html = '';
  project.shots.forEach((s,i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + i*days);
    html += `<div class="card">Shot ${s.num}: ${d.toDateString()} - ${s.camera} - ${s.duration}s</div>`;
  });
  document.getElementById('scheduleList').innerHTML = html;
}

// SAVE / LOAD / EXPORT
function saveProject() {
  localStorage.setItem('animstudio_pro', JSON.stringify(project));
  alert('Project saved to browser!');
}

function loadProject() {
  const data = localStorage.getItem('animstudio_pro');
  if(data) { project = JSON.parse(data); renderShots(); renderChars(); renderAssets(); renderBudget(); }
  else alert('No save found');
}

async function exportProject() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(20); doc.text("AnimStudio PRO - Production Pack", 10, 15);
  doc.setFontSize(12);

  let y = 30;
  doc.text("STORYBOARD", 10, y); y+=10;
  project.shots.forEach(s => {
    doc.text(`Shot ${s.num} | ${s.camera} | ${s.duration}s`, 10, y); y+=6;
    doc.text(s.desc, 10, y, {maxWidth:180}); y+=12;
    if(y>270){doc.addPage(); y=20;}
  });

  doc.addPage(); y=20;
  doc.text("CHARACTERS", 10, y); y+=10;
  project.characters.forEach(c => {
    doc.text(`${c.name} - ${c.role}`, 10, y); y+=6;
    doc.text(c.desc, 10, y, {maxWidth:180}); y+=12;
  });

  doc.save('AnimStudio_ProductionPack.pdf');
}

// INIT
if(!localStorage.getItem('animstudio_pro')) addShot();
else loadProject();

// PWA install prompt
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('data:text/javascript,');
}
</script>
</body>
  </html>
