<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Web</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #000; color: #fff; overscroll-behavior-y: contain; }
  .app { height: 100vh; overflow: hidden; position: relative; }
    
    /* FEED */
  .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
  .feed::-webkit-scrollbar { display: none; }
  .video-container { 
      height: 100vh; width: 100%; position: relative; 
      scroll-snap-align: start; display: flex; align-items: center; justify-content: center;
      background: #111;
    }
  .video { width: 100%; height: 100%; object-fit: cover; }
    
    /* OVERLAY UI */
  .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 15px 80px; 
      background: linear-gradient(transparent, rgba(0,0,0,0.8)); pointer-events: none; }
  .overlay * { pointer-events: auto; }
    
  .sidebar { position: absolute; right: 8px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; }
  .action-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .icon-btn { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.1); 
      display: flex; align-items: center; justify-content: center; font-size: 24px; backdrop-filter: blur(10px); }
  .icon-btn.liked { color: #fe2c55; }
  .count { font-size: 12px; }
    
  .user-info { margin-bottom: 12px; }
  .username { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
  .caption { font-size: 14px; line-height: 1.3; }
  .sound { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; }
    
    /* BOTTOM NAV */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: #000; 
      border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 2px; color: #888; }
  .nav-btn.active { color: #fff; }
  .nav-icon { font-size: 22px; }
  .upload-btn { width: 44px; height: 30px; background: #fff; border-radius: 8px; display: flex; 
      align-items: center; justify-content: center; color: #000; font-size: 20px; font-weight: bold; }
    
    /* UPLOAD MODAL */
  .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 200; 
      transform: translateY(100%); transition: transform 0.3s; display: flex; flex-direction: column; }
  .modal.open { transform: translateY(0); }
  .modal-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
  .modal-body { flex: 1; padding: 20px; }
  .upload-area { border: 2px dashed #333; border-radius: 12px; padding: 40px 20px; text-align: center; margin-bottom: 20px; }
    input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; 
      padding: 12px; border-radius: 8px; margin: 8px 0; font-size: 16px; }
  .post-btn { width: 100%; background: #fe2c55; color: #fff; border: none; padding: 14px; 
      border-radius: 8px; font-size: 16px; font-weight: 600; margin-top: 10px; }
    
  .hidden { display: none; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
  </style>
</head>
<body>
<div class="app">
  <!-- FEED -->
  <div class="feed" id="feed"></div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <div class="nav-btn active" onclick="goHome()">
      <div class="nav-icon">🏠</div>
      <div>Home</div>
    </div>
    <div class="nav-btn" onclick="showDiscover()">
      <div class="nav-icon">🔍</div>
      <div>Discover</div>
    </div>
    <div class="upload-btn" onclick="openUpload()">+</div>
    <div class="nav-btn" onclick="showInbox()">
      <div class="nav-icon">💬</div>
      <div>Inbox</div>
    </div>
    <div class="nav-btn" onclick="showProfile()">
      <div class="nav-icon">👤</div>
      <div>Profile</div>
    </div>
  </div>

  <!-- UPLOAD MODAL -->
  <div class="modal" id="uploadModal">
    <div class="modal-header">
      <div onclick="closeUpload()">Cancel</div>
      <div style="font-weight:600">Upload</div>
      <div style="color:#fe2c55" onclick="postVideo()">Post</div>
    </div>
    <div class="modal-body">
      <input type="file" id="videoFile" accept="video/*" class="hidden" onchange="previewVideo(event)">
      <div class="upload-area" onclick="document.getElementById('videoFile').click()">
        <div style="font-size:48px;margin-bottom:10px">📹</div>
        <div>Tap to upload video</div>
        <div style="font-size:12px;color:#888;margin-top:5px">MP4, WebM up to 60s</div>
      </div>
      <video id="preview" class="hidden" style="width:100%;border-radius:12px;margin-bottom:15px" controls></video>
      <textarea id="caption" placeholder="Describe your video..." rows="3"></textarea>
      <input id="hashtags" placeholder="#fyp #viral #southafrica">
    </div>
  </div>
</div>

<script>
let videos = JSON.parse(localStorage.getItem('tiktok_videos') || '[]');
let currentVideoIndex = 0;

// DEMO VIDEOS if empty
if(videos.length === 0) {
  videos = [
    {
      id: 1, url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
      user: '@blessing158', avatar: 'https://i.pravatar.cc/100?u=blessing',
      caption: 'Testing my new TikTok Web 🔥 #fyp #coding', sound: 'Original Sound - blessing158',
      likes: 1247, liked: false, comments: 89, shares: 23
    },
    {
      id: 2, url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4',
      user: '@devhub', avatar: 'https://i.pravatar.cc/100?u=devhub',
      caption: 'Build apps from your phone no cap 💯 #webdev #github', sound: 'Trending Sound',
      likes: 8923, liked: false, comments: 421, shares: 156
    }
  ];
  localStorage.setItem('tiktok_videos', JSON.stringify(videos));
}

function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = videos.map((v, i) => `
    <div class="video-container">
      <video class="video" src="${v.url}" loop muted playsinline ${i===0?'autoplay':''}></video>
      <div class="sidebar">
        <div class="action-btn">
          <img src="${v.avatar}" class="avatar">
        </div>
        <div class="action-btn" onclick="toggleLike(${v.id})">
          <div class="icon-btn ${v.liked?'liked':''}">${v.liked?'❤️':'🤍'}</div>
          <div class="count">${formatCount(v.likes)}</div>
        </div>
        <div class="action-btn" onclick="showComments(${v.id})">
          <div class="icon-btn">💬</div>
          <div class="count">${formatCount(v.comments)}</div>
        </div>
        <div class="action-btn" onclick="shareVideo(${v.id})">
          <div class="icon-btn">↗️</div>
          <div class="count">${formatCount(v.shares)}</div>
        </div>
      </div>
      <div class="overlay">
        <div class="user-info">
          <div class="username">${v.user}</div>
          <div class="caption">${v.caption}</div>
          <div class="sound">🎵 ${v.sound}</div>
        </div>
      </div>
    </div>
  `).join('');
  
  setupVideoPlayback();
}

function setupVideoPlayback() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('video');
      if(entry.isIntersecting) {
        video.play();
        currentVideoIndex = Array.from(document.querySelectorAll('.video-container')).indexOf(entry.target);
      } else {
        video.pause();
      }
    });
  }, {threshold: 0.7});
  
  document.querySelectorAll('.video-container').forEach(vc => observer.observe(vc));
}

function toggleLike(id) {
  const v = videos.find(v => v.id === id);
  v.liked =!v.liked;
  v.likes += v.liked? 1 : -1;
  localStorage.setItem('tiktok_videos', JSON.stringify(videos));
  renderFeed();
}

function formatCount(n) {
  if(n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if(n >= 1000) return (n/1000).toFixed(1)+'K';
  return n;
}

function openUpload() {
  document.getElementById('uploadModal').classList.add('open');
}

function closeUpload() {
  document.getElementById('uploadModal').classList.remove('open');
  document.getElementById('preview').classList.add('hidden');
  document.getElementById('videoFile').value = '';
  document.getElementById('caption').value = '';
}

function previewVideo(e) {
  const file = e.target.files[0];
  if(file) {
    const url = URL.createObjectURL(file);
    const preview = document.getElementById('preview');
    preview.src = url;
    preview.classList.remove('hidden');
  }
}

function postVideo() {
  const file = document.getElementById('videoFile').files[0];
  const caption = document.getElementById('caption').value;
  if(!file ||!caption) return alert('Add video and caption');
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const newVideo = {
      id: Date.now(),
      url: e.target.result,
      user: '@you',
      avatar: 'https://i.pravatar.cc/100?u=you',
      caption: caption,
      sound: 'Original Sound - you',
      likes: 0, liked: false, comments: 0, shares: 0
    };
    videos.unshift(newVideo);
    localStorage.setItem('tiktok_videos', JSON.stringify(videos));
    closeUpload();
    renderFeed();
    document.getElementById('feed').scrollTop = 0;
  };
  reader.readAsDataURL(file);
}

function shareVideo(id) {
  const url = window.location.href + '?v=' + id;
  if(navigator.share) {
    navigator.share({title: 'Check this video', url});
  } else {
    navigator.clipboard.writeText(url);
    alert('Link copied!');
  }
  videos.find(v=>v.id===id).shares++;
  localStorage.setItem('tiktok_videos', JSON.stringify(videos));
  renderFeed();
}

function showComments(id) { alert('Comments coming soon. Connect Firebase for real comments.'); }
function showDiscover() { alert('Discover page coming soon'); }
function showInbox() { alert('Inbox coming soon'); }
function showProfile() { alert('Profile coming soon'); }
function goHome() { document.getElementById('feed').scrollTop = 0; }

// INIT
renderFeed();

// Handle video URLs
document.querySelectorAll('video').forEach(v => v.addEventListener('click', () => {
  v.muted =!v.muted;
}));
</script>
</body>
    </html>
