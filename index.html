<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FaceSpace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-border: #3a3b3c; --fb-text: #e4e6eb; --fb-subtext: #b0b3b8; }
    body { background: var(--fb-bg); color: var(--fb-text); font-family: Segoe UI, Helvetica, Arial, sans-serif; }
    .fb-card { background: var(--fb-card); border: 1px solid var(--fb-border); }
    .fb-blue-bg { background: var(--fb-blue); }
    .fb-input { background: #3a3b3c; }
    .tab-active { color: var(--fb-blue); border-bottom: 3px solid var(--fb-blue); }
    .story { aspect-ratio: 9/16; }
    ::-webkit-scrollbar { width: 0px; }
  </style>
</head>
<body class="min-h-screen">

  <!-- TOP NAV -->
  <div class="fb-card border-b border-gray-700 px-2 py-1 flex items-center justify-between sticky top-0 z-50">
    <div class="text-2xl font-bold text-[#1877f2] px-2">facespace</div>
    <div class="flex gap-1">
      <button onclick="showView('feed')" id="nav-home" class="p-3 rounded-lg hover:bg-[#3a3b3c]">🏠</button>
      <button onclick="showView('friends')" id="nav-friends" class="p-3 rounded-lg hover:bg-[#3a3b3c] relative">
        👥 <span id="req-count" class="hidden absolute top-1 right-1 bg-red-500 text-xs w-4 h-4 rounded-full flex items-center justify-center">1</span>
      </button>
      <button onclick="showView('messages')" id="nav-msg" class="p-3 rounded-lg hover:bg-[#3a3b3c]">💬</button>
      <button onclick="showView('notif')" id="nav-notif" class="p-3 rounded-lg hover:bg-[#3a3b3c] relative">
        🔔 <span id="notif-count" class="hidden absolute top-1 right-1 bg-red-500 text-xs w-4 h-4 rounded-full flex items-center justify-center">6</span>
      </button>
      <button onclick="showProfile()" class="p-1"><img id="nav-pic" src="https://i.pravatar.cc/40" class="w-8 h-8 rounded-full"></button>
    </div>
  </div>

  <!-- FEED VIEW -->
  <div id="feed-view" class="max-w-2xl mx-auto">
    <!-- STORIES -->
    <div class="p-4 flex gap-2 overflow-x-auto">
      <div class="story w-28 fb-card rounded-xl relative overflow-hidden flex-shrink-0">
        <div class="h-3/4 bg-gray-600"></div>
        <div class="p-2 text-center text-sm font-medium">Create Story</div>
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 fb-blue-bg w-8 h-8 rounded-full flex items-center justify-center border-4 border-[var(--fb-card)]">+</div>
      </div>
      <div id="stories"></div>
    </div>

    <!-- CREATE POST -->
    <div class="mx-4 mb-4 fb-card rounded-lg p-3">
      <div class="flex gap-3 items-center">
        <img src="https://i.pravatar.cc/40?u=me" class="w-10 h-10 rounded-full">
        <button onclick="openComposer()" class="flex-1 fb-input rounded-full px-4 py-2 text-left text-gray-400">What's on your mind?</button>
      </div>
      <div class="flex mt-3 pt-2 border-t border-gray-700">
        <button class="flex-1 py-1 hover:bg-[#3a3b3c] rounded-lg text-sm">📹 Live</button>
        <button class="flex-1 py-1 hover:bg-[#3a3b3c] rounded-lg text-sm">📷 Photo</button>
        <button class="flex-1 py-1 hover:bg-[#3a3b3c] rounded-lg text-sm">😊 Feeling</button>
      </div>
    </div>

    <!-- POSTS -->
    <div id="posts" class="px-4 pb-20"></div>
  </div>

  <!-- FRIENDS VIEW -->
  <div id="friends-view" class="hidden max-w-2xl mx-auto">
    <div class="flex border-b border-gray-700 px-4">
      <button onclick="friendsTab('suggestions')" id="ftab-sug" class="py-3 px-4 tab-active font-medium">Suggestions</button>
      <button onclick="friendsTab('requests')" id="ftab-req" class="py-3 px-4 text-gray-400">Requests</button>
      <button onclick="friendsTab('all')" id="ftab-all" class="py-3 px-4 text-gray-400">All Friends</button>
    </div>
    <div id="friends-content" class="p-4"></div>
  </div>

  <!-- MESSAGES VIEW -->
  <div id="messages-view" class="hidden max-w-2xl mx-auto">
    <div class="p-4 font-bold text-xl">Messages</div>
    <div id="chats-list" class="px-4"></div>
  </div>

  <!-- NOTIFICATIONS VIEW -->
  <div id="notif-view" class="hidden max-w-2xl mx-auto">
    <div class="p-4 font-bold text-xl">Notifications</div>
    <div id="notifs-list"></div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-view" class="hidden h-screen flex flex-col">
    <div class="fb-card p-3 flex items-center gap-3 border-b border-gray-700">
      <button onclick="closeChat()" class="text-xl">←</button>
      <img id="chat-pic" class="w-10 h-10 rounded-full">
      <div class="flex-1">
        <div id="chat-name" class="font-medium"></div>
        <div class="text-xs text-gray-400">Active now</div>
      </div>
      <button>📞</button>
      <button>📹</button>
    </div>
    <div id="chat-msgs" class="flex-1 overflow-y-auto p-4 space-y-1"></div>
    <div class="fb-card p-3 flex gap-2 border-t border-gray-700">
      <input id="chat-input" placeholder="Message..." class="flex-1 fb-input rounded-full px-4 py-2 outline-none">
      <button onclick="sendChat()" class="fb-blue-bg w-10 h-10 rounded-full">➤</button>
    </div>
  </div>

  <!-- COMPOSER MODAL -->
  <div id="composer" class="hidden fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center">
    <div class="fb-card w-full sm:max-w-xl sm:rounded-lg">
      <div class="p-4 border-b border-gray-700 font-bold text-center relative">Create post<button onclick="closeComposer()" class="absolute right-4 top-4">✕</button></div>
      <div class="p-4">
        <div class="flex gap-3 mb-3">
          <img src="https://i.pravatar.cc/40?u=me" class="w-10 h-10 rounded-full">
          <div class="font-medium">You</div>
        </div>
        <textarea id="post-text" placeholder="What's on your mind?" class="w-full bg-transparent outline-none text-xl h-40 resize-none"></textarea>
        <input id="post-img" placeholder="Image URL" class="w-full fb-input p-2 rounded mt-2 outline-none text-sm">
      </div>
      <div class="p-4"><button onclick="createPost()" class="w-full fb-blue-bg p-2 rounded-lg font-bold">Post</button></div>
    </div>
  </div>

<script>
const DB = {
  get: (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d)),
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
}

// SEED DATA - looks like your video
if (!DB.get('init', false)) {
  DB.set('profile', { name: 'Ma Flower Lee', id: 'me', pic: 'https://i.pravatar.cc/40?u=me' })
  DB.set('posts', [
    { id: 1, author: 'Sarcasm', authorId: 'u1', verified: true, time: '1d', text: 'The 2026 worldcup host countries ⚽', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Map_of_North_America.png/640px-Map_of_North_America.png', likes: 1240, comments: 89, shares: 12 },
    { id: 2, author: 'MashaBa M. Sebela', authorId: 'u2', time: '6h', text: '+1 To Myself🥳🎂🔥🤘', likes: 70, comments: 1, shares: 1, mentions: ['@followers'] }
  ])
  DB.set('users', [
    { id: 'u1', name: 'Sarcasm', pic: 'https://i.pravatar.cc/40?u=u1', verified: true },
    { id: 'u2', name: 'MashaBa M. Sebela', pic: 'https://i.pravatar.cc/40?u=u2' },
    { id: 'u3', name: 'Brilliant Baloyi', pic: 'https://i.pravatar.cc/40?u=u3' },
    { id: 'u4', name: 'Alwande Mkhwanazi', pic: 'https://i.pravatar.cc/40?u=u4' }
  ])
  DB.set('friends', ['u3'])
  DB.set('friendReqs', [{ id: 'u5', name: 'Nosihle Mabuyakhulu', pic: 'https://i.pravatar.cc/40?u=u5' }])
  DB.set('suggestions', [
    { id: 'u4', name: 'Alwande Mkhwanazi', mutual: 1, pic: 'https://i.pravatar.cc/40?u=u4' },
    { id: 'u6', name: 'Prweedy Krl Lerawww', mutual: 34, pic: 'https://i.pravatar.cc/40?u=u6' },
    { id: 'u7', name: 'Tentacionic Darkkid', mutual: 81, pic: 'https://i.pravatar.cc/40?u=u7' }
  ])
  DB.set('chats', [
    { id: 'u3', lastMsg: 'Hi', time: '7h', unread: false },
    { id: 'u8', name: 'Shai Ajast', lastMsg: 'New Facebook friend', time: '1d', unread: false }
  ])
  DB.set('messages', { 'u3': [{ me: false, text: 'Hud', time: 'Sat 14:44' }, { me: false, text: 'Hi', time: 'Sat 14:44' }] })
  DB.set('notifs', [
    { id: 1, text: 'CentralOI SA mentioned you and other followers in a comment.', time: '16 seconds ago' },
    { id: 2, text: 'Nosihle Mabuyakhulu accepted your friend request.', time: '5h ago' },
    { id: 3, text: 'Baddie A Kgantso and 3 others have birthdays today. Help them celebrate!', time: '5h ago' }
  ])
  DB.set('init', true)
}

let state = { view: 'feed', chatWith: null }

// RENDER FUNCTIONS
function renderFeed() {
  const posts = DB.get('posts', [])
  const users = DB.get('users', [])
  
  document.getElementById('stories').innerHTML = [
    { name: 'Mametise Lethabo', img: 'https://i.pravatar.cc/100?u=s1' },
    { name: 'Mandee Beats', img: 'https://i.pravatar.cc/100?u=s2' }
  ].map(s => `
    <div class="story w-28 fb-card rounded-xl relative overflow-hidden flex-shrink-0">
      <img src="${s.img}" class="h-full w-full object-cover">
      <div class="absolute top-2 left-2 w-10 h-10 rounded-full border-4 border-[#1877f2] overflow-hidden"><img src="${s.img}"></div>
      <div class="absolute bottom-2 left-2 text-sm font-medium drop-shadow">${s.name}</div>
    </div>
  `).join('')

  document.getElementById('posts').innerHTML = posts.map(p => {
    const user = users.find(u => u.id === p.authorId) || { name: p.author, pic: 'https://i.pravatar.cc/40?u='+p.authorId }
    return `
    <div class="fb-card rounded-lg mb-4">
      <div class="p-4 flex gap-3">
        <img src="${user.pic}" class="w-10 h-10 rounded-full">
        <div class="flex-1">
          <div class="font-medium">${p.author} ${p.verified?'✓':''}</div>
          <div class="text-xs text-gray-400">${p.time} · 🌍</div>
        </div>
        <button>⋯</button>
      </div>
      ${p.text ? `<div class="px-4 pb-3">${p.text}</div>` : ''}
      ${p.img ? `<img src="${p.img}" class="w-full">` : ''}
      <div class="px-4 py-2 flex justify-between text-sm text-gray-400">
        <div>😂 ${p.likes}</div>
        <div>${p.comments} comments · ${p.shares} shares</div>
      </div>
      <div class="px-4 py-1 border-t border-gray-700 flex text-gray-400">
        <button onclick="likePost(${p.id})" class="flex-1 py-2 hover:bg-[#3a3b3c] rounded-lg">👍 Like</button>
        <button onclick="commentPost(${p.id})" class="flex-1 py-2 hover:bg-[#3a3b3c] rounded-lg">💬 Comment</button>
        <button class="flex-1 py-2 hover:bg-[#3a3b3c] rounded-lg">↗ Share</button>
      </div>
    </div>`
  }).join('')
}

function renderFriends() {
  const reqs = DB.get('friendReqs', [])
  const sugs = DB.get('suggestions', [])
  document.getElementById('req-count').textContent = reqs.length
  document.getElementById('req-count').classList.toggle('hidden', reqs.length===0)
  
  if (state.friendsTab === 'requests') {
    document.getElementById('friends-content').innerHTML = reqs.map(r => `
      <div class="flex items-center gap-3 py-2">
        <img src="${r.pic}" class="w-16 h-16 rounded-lg">
        <div class="flex-1"><div class="font-medium">${r.name}</div></div>
        <button onclick="acceptReq('${r.id}')" class="fb-blue-bg px-6 py-2 rounded-lg font-medium">Confirm</button>
        <button class="bg-[#3a3b3c] px-6 py-2 rounded-lg font-medium">Delete</button>
      </div>
    `).join('') || '<div class="text-center text-gray-400 py-8">No requests</div>'
  } else {
    document.getElementById('friends-content').innerHTML = `
      <div class="font-medium mb-2">People you may know</div>
      ${sugs.map(s => `
        <div class="flex items-center gap-3 py-3">
          <img src="${s.pic}" class="w-16 h-16 rounded-lg">
          <div class="flex-1">
            <div class="font-medium">${s.name}</div>
            <div class="text-sm text-gray-400">${s.mutual} mutual friends</div>
          </div>
          <button onclick="addFriend('${s.id}')" class="fb-blue-bg px-6 py-2 rounded-lg font-medium">Add friend</button>
          <button class="bg-[#3a3b3c] px-6 py-2 rounded-lg font-medium">Remove</button>
        </div>
      `).join('')}
    `
  }
}

function renderMessages() {
  const chats = DB.get('chats', [])
  const users = DB.get('users', [])
  document.getElementById('chats-list').innerHTML = chats.map(c => {
    const user = users.find(u => u.id === c.id) || { name: c.name || c.id, pic: 'https://i.pravatar.cc/40?u='+c.id }
    return `
    <div onclick="openChat('${c.id}')" class="flex items-center gap-3 py-3 px-2 hover:bg-[#3a3b3c] rounded-lg">
      <img src="${user.pic}" class="w-14 h-14 rounded-full">
      <div class="flex-1">
        <div class="font-medium">${user.name}</div>
        <div class="text-sm text-gray-400">${c.lastMsg}</div>
      </div>
      <div class="text-xs text-gray-400">${c.time}</div>
    </div>`
  }).join('')
}

function renderNotifs() {
  const notifs = DB.get('notifs', [])
  document.getElementById('notif-count').textContent = notifs.length
  document.getElementById('notif-count').classList.toggle('hidden', notifs.length===0)
  document.getElementById('notifs-list').innerHTML = notifs.map(n => `
    <div class="flex gap-3 p-4 hover:bg-[#3a3b3c]">
      <div class="w-14 h-14 bg-gray-600 rounded-full flex-shrink-0"></div>
      <div class="flex-1">
        <div class="text-sm">${n.text}</div>
        <div class="text-xs text-gray-400 mt-1">${n.time}</div>
      </div>
    </div>
  `).join('')
}

// ACTIONS
function showView(v) {
  ['feed','friends','messages','notif','chat'].forEach(x => document.getElementById(x+'-view').classList.add('hidden'))
  document.getElementById(v+'-view').classList.remove('hidden')
  state.view = v
  if(v==='feed') renderFeed()
  if(v==='friends') { state.friendsTab='suggestions'; renderFriends() }
  if(v==='messages') renderMessages()
  if(v==='notif') renderNotifs()
}

function friendsTab(t) {
  state.friendsTab = t
  document.querySelectorAll('[id^=ftab-]').forEach(e => e.classList.remove('tab-active'))
  document.getElementById('ftab-'+t.substring(0,3)).classList.add('tab-active')
  renderFriends()
}

function openComposer() { document.getElementById('composer').classList.remove('hidden') }
function closeComposer() { document.getElementById('composer').classList.add('hidden') }

function createPost() {
  const text = document.getElementById('post-text').value
  const img = document.getElementById('post-img').value
  if (!text && !img) return
  const posts = DB.get('posts', [])
  posts.unshift({ id: Date.now(), author: 'You', authorId: 'me', time: 'Just now', text, img, likes: 0, comments: 0, shares: 0 })
  DB.set('posts', posts)
  closeComposer()
  renderFeed()
  document.getElementById('post-text').value = ''
  document.getElementById('post-img').value = ''
}

function likePost(id) {
  const posts = DB.get('posts', [])
  const p = posts.find(x => x.id === id)
  if (p) { p.likes++; DB.set('posts', posts); renderFeed() }
}

function commentPost(id) {
  const text = prompt('Write a comment:')
  if (!text) return
  const posts = DB.get('posts', [])
  const p = posts.find(x => x.id === id)
  if (p) { p.comments++; DB.set('posts', posts); renderFeed() }
}

function addFriend(id) {
  const sugs = DB.get('suggestions', [])
  const friends = DB.get('friends', [])
  if (!friends.includes(id)) {
    friends.push(id)
    DB.set('friends', friends)
    DB.set('suggestions', sugs.filter(s => s.id !== id))
    renderFriends()
  }
}

function acceptReq(id) {
  const reqs = DB.get('friendReqs', [])
  const friends = DB.get('friends', [])
  friends.push(id)
  DB.set('friends', friends)
  DB.set('friendReqs', reqs.filter(r => r.id !== id))
  renderFriends()
}

function openChat(id) {
  state.chatWith = id
  const users = DB.get('users', [])
  const user = users.find(u => u.id === id) || { name: id, pic: 'https://i.pravatar.cc/40?u='+id }
  document.getElementById('chat-name').textContent = user.name
  document.getElementById('chat-pic').src = user.pic
  const msgs = DB.get('messages', {})[id] || []
  document.getElementById('chat-msgs').innerHTML = msgs.map(m => `
    <div class="flex ${m.me?'justify-end':'justify-start'}">
      <div class="${m.me?'fb-blue-bg':'bg-[#3a3b3c]'} rounded-2xl px-3 py-2 max-w-[75%]">${m.text}</div>
    </div>
  `).join('')
  showView('chat')
}

function closeChat() { showView('messages') }

function sendChat() {
  const text = document.getElementById('chat-input').value.trim()
  if (!text || !state.chatWith) return
  const allMsgs = DB.get('messages', {})
  if (!allMsgs[state.chatWith]) allMsgs[state.chatWith] = []
  allMsgs[state.chatWith].push({ me: true, text, time: 'Now' })
  DB.set('messages', allMsgs)
  document.getElementById('chat-input').value = ''
  openChat(state.chatWith)
}

function showProfile() {
  const p = DB.get('profile', {})
  const name = prompt('Your name:', p.name)
  if (name) { p.name = name; DB.set('profile', p) }
}

// INIT
renderFeed()
document.getElementById('nav-home').classList.add('bg-[#3a3b3c]')
</script>
</body>
  </html>
