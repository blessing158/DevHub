<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chata</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">
  <div id="auth-section" class="h-screen flex items-center justify-center">
    <div class="bg-white p-6 rounded-lg shadow w-80">
      <h1 class="text-2xl font-bold mb-4 text-green-600">Chata</h1>
      <input id="phone" type="tel" placeholder="Phone number" class="w-full border p-2 mb-2 rounded">
      <input id="username" type="text" placeholder="Username" class="w-full border p-2 mb-2 rounded">
      <button id="login-btn" class="w-full bg-green-500 text-white p-2 rounded font-bold">Start Chatting</button>
    </div>
  </div>

  <div id="app-section" class="hidden h-screen">
    <div class="bg-green-600 text-white p-4 flex justify-between">
      <h1 class="text-xl font-bold">Chata</h1>
      <button id="new-chat-btn" class="font-bold">+ New</button>
    </div>
    <div id="chat-list" class="overflow-y-auto"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
