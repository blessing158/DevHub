<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevChat Sign Up</title>

<style>
body{
background:#0f0f0f;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.container{
background:#1a1a1a;
padding:30px;
border-radius:15px;
width:350px;
}

h1{
text-align:center;
color:#FFD700;
}

input{

padding:12px;

border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#FFD700;
color:black;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Create Account</h1>

<input type="text" placeholder="Username">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button onclick="window.location.href='dashboard.html'">
Create Account
</button>

</div>

</body>
</html>
