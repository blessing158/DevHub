<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevHub Sign Up</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:#1a1a1a;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 0 20px rgba(255,215,0,0.2);
}

h1{
text-align:center;
color:gold;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
background:gold;
color:black;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

a{
color:gold;
text-decoration:none;
}

p{
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>Create Account</h1>

<form>
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm Password" required>

<button type="submit">Create Account</button>
</form>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</body>
  </html>
