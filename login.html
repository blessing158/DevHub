<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevHub Studios</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0d0d0d;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:#161616;
    padding:35px;
    border-radius:15px;
    border:2px solid gold;
    box-shadow:0 0 20px rgba(255,215,0,0.2);
}

.logo{
    text-align:center;
    color:gold;
    font-size:30px;
    font-weight:bold;
    margin-bottom:30px;
}

.logo span{
    color:#d40000;
}

label{
    color:white;
    display:block;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

input:focus{
    outline:2px solid gold;
}

.forgot{
    text-align:right;
    margin-bottom:20px;
}

.forgot a{
    color:gold;
    text-decoration:none;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#d40000;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    background:gold;
    color:black;
}

.signup{
    text-align:center;
    margin-top:20px;
    color:white;
}

.signup a{
    color:gold;
    text-decoration:none;
    font-weight:bold;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:380px;
    background:#161616;
    border:2px solid gold;
    border-radius:15px;
    padding:30px;
}

.modal-content h2{
    text-align:center;
    color:gold;
    margin-bottom:20px;
}

.close{
    float:right;
    color:white;
    font-size:28px;
    cursor:pointer;
}

.close:hover{
    color:#d40000;
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">
        Dev<span>Hub</span> Studios
    </div>

    <form action="dashboard.html">

        <label>Email</label>
        <input type="email" placeholder="Enter Email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter Password" required>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn">
            Login
        </button>

    </form>

    <div class="signup">
        Don't have an account?<br><br>
        <a href="#" onclick="openSignup()">Sign Up</a>
    </div>

</div>

<!-- SIGNUP POPUP -->

<div id="signupModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeSignup()">&times;</span>

        <h2>Create DevHub Account</h2>

        <input type="text" placeholder="Full Name" required>

        <input type="email" placeholder="Email Address" required>

        <input type="password" placeholder="Password" required>

        <input type="password" placeholder="Confirm Password" required>

        <button class="btn">
            Create Account
        </button>

    </div>

</div>

<script>

function openSignup(){
    document.getElementById("signupModal").style.display = "flex";
}

function closeSignup(){
    document.getElementById("signupModal").style.display = "none";
}

window.onclick = function(event){
    const modal = document.getElementById("signupModal");

    if(event.target == modal){
        modal.style.display = "none";
    }
}

</script>

</body>
  </html>
